        ),
        React.createElement("div", { style:{width:"100%",maxWidth:"500px",display:"flex",gap:"8px",alignItems:"flex-end"} },
          React.createElement("textarea", { ref:inputRef, value:input, onChange:e=>setInput(e.target.value), onKeyDown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();triage();}}, placeholder:"例：HTMLでリンクを作りたいけどわからない...", rows:2, style:{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"14px",padding:"12px 15px",color:"#eef2ff",fontSize:"13.5px",resize:"none",outline:"none",fontFamily:"inherit",lineHeight:"1.6",transition:"border-color 0.2s"}, onFocus:e=>e.target.style.borderColor="rgba(0,200,255,0.5)", onBlur:e=>e.target.style.borderColor="rgba(255,255,255,0.12)" }),
          React.createElement("button", { onClick:triage, disabled:!input.trim()||loading, style:{width:"48px",height:"48px",borderRadius:"13px",background:input.trim()&&!loading?"linear-gradient(135deg,#00c2ff,#0055ff)":"rgba(255,255,255,0.07)",border:"none",cursor:input.trim()&&!loading?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",color:"#fff",flexShrink:0,boxShadow:input.trim()&&!loading?"0 4px 16px rgba(0,150,255,0.4)":"none",transition:"all 0.2s"} }, loading?"⏳":"↑")
        )
      );
    }

    function App() {
      const [activeId, setActiveId] = useState("__triage__");
      const [category, setCategory] = useState("すべて");
      const [routeState, setRouteState] = useState({});

      const handleRoute = (spId, question) => {
        setRouteState(p => ({...p, [spId]:question}));
        setActiveId(spId);
      };

      const active = SPECIALISTS.find(s=>s.id===activeId);
      const filtered = category==="すべて" ? SPECIALISTS : SPECIALISTS.filter(s=>s.category===category);

      return React.createElement("div", { style:{minHeight:"100vh",background:"linear-gradient(160deg,#060a14 0%,#0b1428 55%,#080e20 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",padding:"16px"} },
        React.createElement("div", { style:{width:"100%",maxWidth:"760px",marginBottom:"12px"} },
          React.createElement("div", { style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"} },
            React.createElement("div", { style:{width:"38px",height:"38px",borderRadius:"10px",background:"linear-gradient(135deg,#00c2ff,#0055ff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"19px",boxShadow:"0 0 16px rgba(0,160,255,0.35)",flexShrink:0} }, "🧠"),
            React.createElement("div", null,
              React.createElement("div", { style:{color:"#fff",fontWeight:"700",fontSize:"14px"} }, "BRAIN IT スペシャリストチーム"),
              React.createElement("div", { style:{color:"rgba(255,255,255,0.35)",fontSize:"11px"} }, `専門家を選ぶか、そのまま質問してください • ${SPECIALISTS.length}人対応中`)
            )
          ),
          React.createElement("div", { style:{display:"flex",gap:"6px",marginBottom:"10px"} },
            CATEGORIES.map(cat => React.createElement("button", { key:cat, onClick:()=>setCategory(cat), style:{padding:"4px 12px",borderRadius:"20px",border:category===cat?"1px solid rgba(255,255,255,0.3)":"1px solid rgba(255,255,255,0.08)",background:category===cat?"rgba(255,255,255,0.1)":"transparent",color:category===cat?"#fff":"rgba(255,255,255,0.35)",fontSize:"11px",cursor:"pointer",transition:"all 0.2s"} }, cat))
          ),
          React.createElement("div", { style:{display:"flex",flexWrap:"wrap",gap:"7px"} },
            React.createElement("button", { onClick:()=>setActiveId("__triage__"), style:{display:"flex",alignItems:"center",gap:"7px",padding:"8px 14px",borderRadius:"12px",background:activeId==="__triage__"?"linear-gradient(135deg,rgba(0,200,255,0.18),rgba(0,200,255,0.08))":"rgba(255,255,255,0.03)",border:activeId==="__triage__"?"1.5px solid rgba(0,200,255,0.45)":"1.5px solid rgba(255,255,255,0.07)",cursor:"pointer",transition:"all 0.2s",boxShadow:activeId==="__triage__"?"0 0 14px rgba(0,200,255,0.25)":"none"} },
              React.createElement("span", { style:{fontSize:"16px"} }, "🤖"),
              React.createElement("div", { style:{textAlign:"left"} },
                React.createElement("div", { style:{color:activeId==="__triage__"?"#00c8ff":"rgba(255,255,255,0.55)",fontSize:"12px",fontWeight:activeId==="__triage__"?"700":"500",whiteSpace:"nowrap"} }, "自動で振り分け"),
                React.createElement("div", { style:{color:"rgba(255,255,255,0.25)",fontSize:"9.5px",whiteSpace:"nowrap"} }, "まずここから")
              ),
              activeId==="__triage__" && React.createElement("div", { style:{width:"6px",height:"6px",borderRadius:"50%",background:"#00c8ff",marginLeft:"2px",boxShadow:"0 0 6px #00c8ff",animation:"pulse 2s ease-in-out infinite"} })
            ),
            filtered.map(s => {
              const isActive = s.id===activeId;
              return React.createElement("button", { key:s.id, onClick:()=>setActiveId(s.id), style:{display:"flex",alignItems:"center",gap:"7px",padding:"8px 14px",borderRadius:"12px",background:isActive?`linear-gradient(135deg,${s.color}20,${s.color}0d)`:"rgba(255,255,255,0.03)",border:isActive?`1.5px solid ${s.color}55`:"1.5px solid rgba(255,255,255,0.07)",cursor:"pointer",transition:"all 0.2s",boxShadow:isActive?`0 0 14px ${s.glow}`:"none"} },
                React.createElement("span", { style:{fontSize:"16px"} }, s.emoji),
                React.createElement("div", { style:{textAlign:"left"} },
                  React.createElement("div", { style:{color:isActive?s.color:"rgba(255,255,255,0.55)",fontSize:"12px",fontWeight:isActive?"700":"500",whiteSpace:"nowrap"} }, s.name),
                  React.createElement("div", { style:{color:"rgba(255,255,255,0.25)",fontSize:"9.5px",whiteSpace:"nowrap"} }, s.role)
                ),
                isActive && React.createElement("div", { style:{width:"6px",height:"6px",borderRadius:"50%",background:s.color,marginLeft:"2px",boxShadow:`0 0 6px ${s.color}`,animation:"pulse 2s ease-in-out infinite"} })
              );
            })
          )
        ),
        React.createElement("div", { style:{width:"100%",maxWidth:"760px",height:"490px",background:"rgba(255,255,255,0.025)",border:`1px solid ${active?active.color+"22":"rgba(0,200,255,0.15)"}`,borderRadius:"18px",overflow:"hidden",boxShadow:"0 20px 70px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05)",display:"flex",flexDirection:"column",transition:"border-color 0.3s"} },
          React.createElement("div", { style:{padding:"12px 16px",borderBottom:`1px solid ${active?active.color+"18":"rgba(0,200,255,0.1)"}`,background:active?`linear-gradient(90deg,${active.color}0a,transparent)`:"linear-gradient(90deg,rgba(0,200,255,0.05),transparent)",display:"flex",alignItems:"center",gap:"9px"} },
            React.createElement("span", { style:{fontSize:"18px"} }, active?active.emoji:"🤖"),
            React.createElement("div", null,
              React.createElement("span", { style:{color:active?active.color:"#00c8ff",fontWeight:"700",fontSize:"13px"} }, active?active.name:"AIナビゲーター"),
              React.createElement("span", { style:{color:"rgba(255,255,255,0.28)",fontSize:"11px",marginLeft:"8px"} }, active?active.role:"質問を分析して最適な専門家につなぎます")
            ),
            React.createElement("div", { style:{marginLeft:"auto",display:"flex",alignItems:"center",gap:"5px",background:"rgba(0,255,120,0.08)",border:"1px solid rgba(0,255,120,0.2)",borderRadius:"20px",padding:"3px 9px"} },
              React.createElement("div", { style:{width:"5px",height:"5px",borderRadius:"50%",background:"#00ff78",boxShadow:"0 0 6px #00ff78",animation:"pulse 2s ease-in-out infinite"} }),
              React.createElement("span", { style:{color:"#00ff78",fontSize:"10px",fontWeight:"600"} }, "対応中")
            )
          ),
          activeId==="__triage__"
            ? React.createElement(TriageWindow, { onRoute:handleRoute })
            : React.createElement(ChatWindow, { key:`${active.id}-${routeState[active.id]||""}`, specialist:active, initialMessage:routeState[active.id] })
        ),
        React.createElement("div", { style:{marginTop:"10px",color:"rgba(255,255,255,0.13)",fontSize:"10px",textAlign:"center"} }, "スタッフへの相談はいつでもどうぞ ✦ Powered by Gemini AI")
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
