<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAIN IT ラーニングアシスタント</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181a24;
  --surface2: #1e2130;
  --surface3: #252838;
  --border: #2a2d3e;
  --accent: #00d4aa;
  --accent-dim: rgba(0,212,170,0.12);
  --text: #e2e4ed;
  --text-dim: #6b7094;
  --text-muted: #4a4f6a;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.header-logo {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), #00a885);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--bg);
}
.header-text h1 { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
.header-text p { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.tab-area { background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab-filters { display: flex; gap: 6px; padding: 8px 16px 4px; }
.filter-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  font-size: 11px; font-family: inherit; padding: 4px 12px; border-radius: 20px;
  cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.tab-scroll { display: flex; gap: 4px; padding: 8px 16px 10px; overflow-x: auto; scrollbar-width: none; }
.tab-scroll::-webkit-scrollbar { display: none; }
.tab-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  font-size: 12px; font-family: inherit; font-weight: 500; padding: 6px 14px;
  border-radius: 20px; cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
}
.tab-btn:hover { border-color: var(--text-dim); color: var(--text); }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 700; }
.tab-btn .tab-icon { margin-right: 4px; }
.chat-area {
  flex: 1; overflow-y: auto; padding: 20px 16px;
  display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
}
.msg { display: flex; gap: 10px; max-width: 88%; animation: msgIn 0.3s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar {
  width: 32px; height: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
}
.msg.bot .msg-avatar { background: var(--accent-dim); }
.msg.user .msg-avatar { background: var(--surface3); }
.msg-body {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 16px; font-size: 14px; line-height: 1.7;
}
.msg.user .msg-body { background: var(--accent); border-color: var(--accent); color: var(--bg); }
.msg-body code { font-family: 'JetBrains Mono', monospace; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.msg-body pre { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.5; }
.msg-specialist { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
.msg-body img.user-image { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 6px; display: block; }
.typing { display: flex; gap: 4px; padding: 4px 0; }
.typing span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,60%,100% { opacity: 0.2; } 30% { opacity: 1; } }
.welcome { text-align: center; padding: 40px 20px; animation: msgIn 0.5s ease; }
.welcome-icon { font-size: 48px; margin-bottom: 16px; }
.welcome h2 { font-size: 18px; color: #fff; margin-bottom: 8px; }
.welcome p { font-size: 13px; color: var(--text-dim); line-height: 1.7; max-width: 400px; margin: 0 auto 20px; }
.quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.quick-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-size: 12px; font-family: inherit; padding: 8px 16px; border-radius: 20px;
  cursor: pointer; transition: all 0.2s;
}
.quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.input-row textarea {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-family: inherit; font-size: 14px; padding: 12px 16px; border-radius: var(--radius);
  resize: none; min-height: 46px; max-height: 120px; line-height: 1.5; outline: none; transition: border-color 0.2s;
}
.input-row textarea:focus { border-color: var(--accent); }
.input-row textarea::placeholder { color: var(--text-muted); }
.img-btn {
  width: 46px; height: 46px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text-dim); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
}
.img-btn:hover { border-color: var(--accent); color: var(--accent); }
.img-btn.has-image { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.send-btn {
  width: 46px; height: 46px; background: var(--accent); border: none; border-radius: 12px;
  color: var(--bg); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
}
.send-btn:hover { background: #00e6b8; transform: scale(1.05); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
.input-hint { font-size: 10px; color: var(--text-muted); margin-top: 6px; text-align: center; }
.image-preview {
  display: none; padding: 8px 16px 0; background: var(--surface);
}
.image-preview.show { display: flex; align-items: center; gap: 10px; }
.image-preview img { height: 48px; border-radius: 6px; border: 1px solid var(--border); }
.image-preview .preview-name { font-size: 11px; color: var(--text-dim); flex: 1; }
.image-preview .preview-remove {
  background: none; border: none; color: var(--text-muted); font-size: 18px;
  cursor: pointer; padding: 4px 8px;
}
.image-preview .preview-remove:hover { color: #ff6b6b; }
.route-badge { display: inline-block; background: var(--accent-dim); color: var(--accent); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-bottom: 6px; }
@media (max-width: 600px) { .header { padding: 10px 14px; } .msg { max-width: 95%; } .welcome { padding: 24px 14px; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">B</div>
  <div class="header-text">
    <h1>BRAIN IT ラーニングアシスタント</h1>
    <p>学習で困ったら、まずここで聞いてみよう</p>
  </div>
</div>
<div class="tab-area">
  <div class="tab-filters">
    <button class="filter-btn active" data-filter="all" onclick="filterTabs('all')">すべて</button>
    <button class="filter-btn" data-filter="learn" onclick="filterTabs('learn')">学習</button>
    <button class="filter-btn" data-filter="code" onclick="filterTabs('code')">プログラミング</button>
    <button class="filter-btn" data-filter="creative" onclick="filterTabs('creative')">クリエイティブ</button>
  </div>
  <div class="tab-scroll" id="tabScroll">
    <button class="tab-btn active" data-id="navi" data-cat="all" onclick="switchTab('navi')"><span class="tab-icon">🧭</span>AIナビ</button>
    <button class="tab-btn" data-id="coach" data-cat="learn" onclick="switchTab('coach')"><span class="tab-icon">📚</span>学習コーチ</button>
    <button class="tab-btn" data-id="html" data-cat="code" onclick="switchTab('html')"><span class="tab-icon">🌐</span>HTML</button>
    <button class="tab-btn" data-id="css" data-cat="code" onclick="switchTab('css')"><span class="tab-icon">🎨</span>CSS</button>
    <button class="tab-btn" data-id="js" data-cat="code" onclick="switchTab('js')"><span class="tab-icon">⚡</span>JavaScript</button>
    <button class="tab-btn" data-id="php" data-cat="code" onclick="switchTab('php')"><span class="tab-icon">🐘</span>PHP</button>
    <button class="tab-btn" data-id="unity" data-cat="code" onclick="switchTab('unity')"><span class="tab-icon">🎮</span>Unity</button>
    <button class="tab-btn" data-id="ps" data-cat="creative" onclick="switchTab('ps')"><span class="tab-icon">🖼️</span>Photoshop</button>
    <button class="tab-btn" data-id="ai" data-cat="creative" onclick="switchTab('ai')"><span class="tab-icon">✏️</span>Illustrator</button>
    <button class="tab-btn" data-id="blender" data-cat="creative" onclick="switchTab('blender')"><span class="tab-icon">🧊</span>Blender</button>
    <button class="tab-btn" data-id="premiere" data-cat="creative" onclick="switchTab('premiere')"><span class="tab-icon">🎬</span>Premiere</button>
  </div>
</div>
<div class="chat-area" id="chatArea">
  <div class="welcome">
    <div class="welcome-icon">🧭</div>
    <h2>何について聞きたい？</h2>
    <p>質問を入力すると、AIナビゲーターが最適なスペシャリストに自動で振り分けます。直接タブを選んでもOK。</p>
    <div class="quick-btns">
      <button class="quick-btn" onclick="sendQuick('HTMLでリンクの貼り方がわからない')">HTMLでリンクの貼り方</button>
      <button class="quick-btn" onclick="sendQuick('CSSでボタンを中央に置きたい')">CSSで中央配置</button>
      <button class="quick-btn" onclick="sendQuick('勉強のモチベが上がらない')">モチベが上がらない</button>
      <button class="quick-btn" onclick="sendQuick('Blenderで3Dモデルを作りたい')">Blender入門</button>
    </div>
  </div>
</div>
<div class="image-preview" id="imagePreview">
  <img id="previewImg" src="" alt="preview">
  <span class="preview-name" id="previewName"></span>
  <button class="preview-remove" onclick="removeImage()">✕</button>
</div>
<div class="input-area">
  <div class="input-row">
    <button class="img-btn" id="imgBtn" onclick="document.getElementById('fileInput').click()" title="画像を添付">📷</button>
    <input type="file" id="fileInput" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none" onchange="handleImageSelect(event)">
    <textarea id="userInput" rows="1" placeholder="質問を入力してください..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="input-hint">Shift+Enter で改行 ／ Enter で送信 ／ 📷 画像添付</div>
</div>
<script>
var WORKER_URL = "https://brain-it-proxy.silensu0325.workers.dev";
var pendingImage = null;

var SPECIALISTS = {
  navi: { name: "AIナビゲーター", icon: "🧭", system: "あなたはBRAIN ITトレーニングセンター郡山のAIナビゲーターです。利用者の質問を分析し、最適なスペシャリストに振り分ける役割です。\n\n以下のスペシャリストがいます：\n- coach: 学習コーチ（勉強法、モチベーション、学習計画）\n- html: HTML専門家\n- css: CSS専門家\n- js: JavaScript専門家\n- php: PHP専門家\n- unity: Unity専門家（C#、ゲーム開発）\n- ps: Photoshop専門家\n- ai: Illustrator専門家\n- blender: Blender専門家（3Dモデリング）\n- premiere: Premiere Pro専門家（動画編集）\n\nユーザーの質問に対して、まず以下のJSON形式で振り分け先を回答してください：\n{\"route\": \"スペシャリストID\", \"reason\": \"振り分け理由（1文）\"}\n\nその後、改行して簡潔な挨拶を追加してください。一般的な雑談や挨拶にはrouteを\"navi\"にして自分で応答してください。画像が添付されている場合も、内容を見て適切なスペシャリストに振り分けてください。" },
  coach: { name: "学習コーチ", icon: "📚", system: "あなたは学習コーチです。利用者が『自ら問いを立てる力』を養えるようサポートしてください。質問に対してすぐに答えを完結させず、『今の時点でどこまで理解できていますか？』などの逆質問を1つ含めてください。専門用語は避け、1歩だけ前に進める助言を200字以内で伝えてください。" },
  html: { name: "HTML専門家", icon: "🌐", system: "あなたはHTML専門家です。コード例を積極的に示す。なぜそう書くのかも簡潔に説明。コード例は必ずバッククォート3つで囲んだコードブロックとして記述してください。" },
  css: { name: "CSS専門家", icon: "🎨", system: "あなたはCSS専門家です。コード例を積極的に示す。Flexbox、Gridなどモダンな手法を優先。コード例は必ずバッククォート3つで囲んだコードブロックとして記述してください。" },
  js: { name: "JavaScript専門家", icon: "⚡", system: "あなたはJavaScript専門家です。コード例を積極的に示す。モダンな書き方を推奨。コード例は必ずバッククォート3つで囲んだコードブロックとして記述してください。" },
  php: { name: "PHP専門家", icon: "🐘", system: "あなたはPHP専門家です。コード例を積極的に示す。セキュリティにも触れる。コード例は必ずバッククォート3つで囲んだコードブロックとして記述してください。" },
  unity: { name: "Unity専門家", icon: "🎮", system: "あなたはUnity専門家です。C#のコード例を積極的に示す。Unityエディタの操作手順も説明。コード例は必ずバッククォート3つで囲んだコードブロックとして記述してください。" },
  ps: { name: "Photoshop専門家", icon: "🖼️", system: "あなたはPhotoshopの専門家です。初心者が迷わないよう【[イメージ] > [色調補正] > [明るさ]】のようにメニューパスを必ず明記してください。また、ツールバーの場所やショートカットキーも添えて、まず『今すぐやるべき3ステップ』を具体的に提示してください。最後に『ここまでで画面に変化はありましたか？』と聞いてください。" },
  ai: { name: "Illustrator専門家", icon: "✏️", system: "あなたはIllustratorの専門家です。初心者が迷わないようメニューパスを明記し、ツールバーの場所やショートカットキーも添えて『今すぐやるべき3ステップ』を具体的に提示してください。最後に『ここまでで画面に変化はありましたか？』と聞いてください。" },
  blender: { name: "Blender専門家", icon: "🧊", system: "あなたはBlenderの専門家です。初心者が迷わないよう、どのモード(オブジェクト/編集等)か明記し、ショートカットキーを必ず添えて『今すぐやるべき3ステップ』を具体的に提示してください。最後に『ここまでで画面に変化はありましたか？』と聞いてください。" },
  premiere: { name: "Premiere Pro専門家", icon: "🎬", system: "あなたはPremiere Pro専門家です。初心者が迷わないよう、どのパネル(タイムライン/プロジェクト等)か明記し、ショートカットキーを必ず添えて『今すぐやるべき3ステップ』を具体的に提示してください。" }
};

var currentTab = "navi";
var chatHistories = {};
var isGenerating = false;
Object.keys(SPECIALISTS).forEach(function(id) { chatHistories[id] = []; });

// ★ 履歴の保存と読み込み機能 ★
function saveHistory() {
  localStorage.setItem('brain_it_history', JSON.stringify(chatHistories));
}
function loadHistory() {
  var saved = localStorage.getItem('brain_it_history');
  if (saved) {
    try {
      var parsed = JSON.parse(saved);
      Object.keys(SPECIALISTS).forEach(function(id) {
        if (parsed[id]) chatHistories[id] = parsed[id];
      });
      renderChat();
    } catch(e) {}
  }
}
window.addEventListener('load', loadHistory);

function handleImageSelect(event) {
  var file = event.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('画像サイズは5MB以下にしてください。'); event.target.value = ''; return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    pendingImage = { base64: e.target.result.split(',')[1], mediaType: file.type, dataUrl: e.target.result, name: file.name };
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('previewName').textContent = file.name;
    document.getElementById('imagePreview').classList.add('show');
    document.getElementById('imgBtn').classList.add('has-image');
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  pendingImage = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('imagePreview').classList.remove('show');
  document.getElementById('imgBtn').classList.remove('has-image');
}

function filterTabs(cat) {
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.filter-btn[data-filter="' + cat + '"]').classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    var c = btn.dataset.cat;
    btn.style.display = (cat === 'all' || c === cat || c === 'all') ? '' : 'none';
  });
}

function switchTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.tab-btn[data-id="' + id + '"]').classList.add('active');
  renderChat();
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function formatMessage(t) {
  var codeBlocks = [];
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m, lang, code) {
    var escaped = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    codeBlocks.push('<pre><code>' + escaped + '</code></pre>');
    return '%%CODEBLOCK' + (codeBlocks.length - 1) + '%%';
  });
  var inlineCodes = [];
  t = t.replace(/`([^`]+)`/g, function(m, code) {
    var escaped = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    inlineCodes.push('<code>' + escaped + '</code>');
    return '%%INLINE' + (inlineCodes.length - 1) + '%%';
  });
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\n/g, '<br>');
  codeBlocks.forEach(function(block, i) { t = t.replace('%%CODEBLOCK' + i + '%%', block); });
  inlineCodes.forEach(function(code, i) { t = t.replace('%%INLINE' + i + '%%', code); });
  return t;
}

function renderChat() {
  var area = document.getElementById('chatArea');
  var history = chatHistories[currentTab];
  if (history.length === 0) {
    var sp = SPECIALISTS[currentTab];
    var desc = currentTab === 'navi'
      ? '質問を入力すると、最適なスペシャリストに自動で振り分けます。直接タブを選んでもOK。'
      : sp.name + 'に何でも聞いてください。初歩的な質問でも大歓迎です。';
    var quickHtml = currentTab === 'navi'
      ? '<div class="quick-btns"><button class="quick-btn" onclick="sendQuick(\'HTMLでリンクの貼り方がわからない\')">HTMLでリンクの貼り方</button><button class="quick-btn" onclick="sendQuick(\'CSSでボタンを中央に置きたい\')">CSSで中央配置</button><button class="quick-btn" onclick="sendQuick(\'勉強のモチベが上がらない\')">モチベが上がらない</button><button class="quick-btn" onclick="sendQuick(\'Blenderで3Dモデルを作りたい\')">Blender入門</button></div>'
      : '';
    area.innerHTML = '<div class="welcome"><div class="welcome-icon">' + sp.icon + '</div><h2>' + sp.name + '</h2><p>' + desc + '</p>' + quickHtml + '</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < history.length; i++) {
    var msg = history[i];
    if (msg.role === 'user') {
      var imgHtml = msg.imageDataUrl ? '<img class="user-image" src="' + msg.imageDataUrl + '" alt="添付画像">' : '';
      html += '<div class="msg user"><div class="msg-avatar">👤</div><div class="msg-body">' + escapeHtml(msg.displayText || msg.content) + imgHtml + '</div></div>';
    } else {
      var sp2 = SPECIALISTS[msg.specialist || currentTab];
      var routeHtml = msg.route ? '<div class="route-badge">→ ' + SPECIALISTS[msg.route].name + 'に転送</div>' : '';
      html += '<div class="msg bot"><div class="msg-avatar">' + sp2.icon + '</div><div class="msg-body"><div class="msg-specialist">' + sp2.name + '</div>' + routeHtml + formatMessage(msg.content) + '</div></div>';
    }
  }
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

function sendQuick(t) { document.getElementById('userInput').value = t; sendMessage(); }

// ★ Enterキーの操作を「Enterで送信、Shift+Enterで改行」に変更 ★
function sendQuick(t) { document.getElementById('userInput').value = t; sendMessage(); }

// ★ Enterキー2回（0.5秒以内）で送信するように変更 ★
var lastEnterTime = 0;
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    var now = Date.now();
    if (now - lastEnterTime < 500) {
      e.preventDefault();
      var ta = document.getElementById('userInput');
      ta.value = ta.value.replace(/\n$/, '');
      sendMessage();
      lastEnterTime = 0;
    } else {
      lastEnterTime = now;
    }
  }
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

async function sendMessage() {
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if ((!text && !pendingImage) || isGenerating) return;
  
  isGenerating = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  var imageForSend = pendingImage;
  var displayText = text || '（画像を送信）';
  
  // ★ ハイブリッド判定: 画像があればGemini、なければClaude
  var modelType = imageForSend ? 'gemini' : 'claude';

  chatHistories[currentTab].push({
    role: 'user',
    content: text,
    displayText: displayText,
    imageDataUrl: imageForSend ? imageForSend.dataUrl : null,
    imageBase64: imageForSend ? imageForSend.base64 : null,
    imageMediaType: imageForSend ? imageForSend.mediaType : null
  });

  removeImage();
  renderChat();
  saveHistory(); // ★送信直後に保存
  showTyping();

  try {
    if (currentTab === 'navi') { 
        await handleNaviRoute(text, imageForSend, modelType); 
    } else { 
        await handleDirectChat(text, currentTab, imageForSend, modelType); 
    }
    saveHistory(); // ★AIの返答後にも保存
  } catch (err) {
    removeTyping();
    chatHistories[currentTab].push({ role: 'assistant', content: '⚠️ エラーが発生しました：' + err.message + '\n\nしばらくしてからもう一度試してみてください。', specialist: currentTab });
    renderChat();
  }
  isGenerating = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function buildMessageContent(text, image) {
  var content = [];
  if (image) {
    content.push({ type: "image", source: { type: "base64", media_type: image.mediaType, data: image.base64 } });
  }
  content.push({ type: "text", text: text || "この画像について教えてください。" });
  return content;
}

// 引数に modelType を追加
async function handleNaviRoute(text, image, modelType) {
  var msgContent = image ? buildMessageContent(text, image) : text;
  var naviResponse = await callAI('navi', [{ role: 'user', content: msgContent }], modelType);
  removeTyping();
  var route = null;
  var cleanResponse = naviResponse;
  var jsonMatch = naviResponse.match(/\{[\s\S]*?"route"[\s\S]*?\}/);
  if (jsonMatch) {
    try {
      var p = JSON.parse(jsonMatch[0]);
      if (p.route && SPECIALISTS[p.route]) route = p.route;
    } catch(e) {}
    cleanResponse = naviResponse.replace(jsonMatch[0], '').trim();
  }
  if (route && route !== 'navi') {
    chatHistories[currentTab].push({ role: 'assistant', content: cleanResponse || SPECIALISTS[route].name + 'につなぎますね！', specialist: 'navi', route: route });
    renderChat();
    switchTab(route);
    chatHistories[route].push({
      role: 'user', content: text, displayText: text || '（画像を送信）',
      imageDataUrl: image ? image.dataUrl : null, imageBase64: image ? image.base64 : null, imageMediaType: image ? image.mediaType : null
    });
    renderChat();
    showTyping();
    var specialistContent = image ? buildMessageContent(text, image) : text;
    var sr = await callAI(route, [{ role: 'user', content: specialistContent }], modelType);
    removeTyping();
    chatHistories[route].push({ role: 'assistant', content: sr, specialist: route });
    renderChat();
  } else {
    chatHistories[currentTab].push({ role: 'assistant', content: cleanResponse || naviResponse, specialist: 'navi' });
    renderChat();
  }
}

// 引数に modelType を追加
async function handleDirectChat(text, sid, image, modelType) {
  var hist = chatHistories[sid];
  var messages = [];
  var count = 0;
  for (var i = hist.length - 1; i >= 0 && count < 10; i--) {
    var m = hist[i];
    if (m.role === 'user' || (m.role === 'assistant' && m.specialist === sid)) {
      var msgContent;
      if (m.role === 'user' && m.imageBase64) {
        msgContent = buildMessageContent(m.content, { base64: m.imageBase64, mediaType: m.imageMediaType });
      } else {
        msgContent = m.content || '';
      }
      messages.unshift({ role: m.role === 'user' ? 'user' : 'assistant', content: msgContent });
      count++;
    }
  }
  var r = await callAI(sid, messages, modelType);
  removeTyping();
  chatHistories[sid].push({ role: 'assistant', content: r, specialist: sid });
  renderChat();
}

// ★ callClaude を callAI に変更し、model を送信データに含める ★
async function callAI(sid, messages, modelType) {
  var sp = SPECIALISTS[sid];
  var res = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ 
        system: sp.system, 
        messages: messages,
        model: modelType // 'gemini' か 'claude' が入る
    })
  });
  if (!res.ok) {
    var e = {};
    try { e = await res.json(); } catch(x) {}
    throw new Error(e.error ? e.error.message : 'HTTP ' + res.status);
  }
  var data = await res.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : "応答を取得できませんでした。";
}

function showTyping() {
  var area = document.getElementById('chatArea');
  var sp = SPECIALISTS[currentTab];
  var d = document.createElement('div');
  d.className = 'msg bot';
  d.id = 'typingMsg';
  d.innerHTML = '<div class="msg-avatar">' + sp.icon + '</div><div class="msg-body"><div class="msg-specialist">' + sp.name + '</div><div class="typing"><span></span><span></span><span></span></div></div>';
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  var el = document.getElementById('typingMsg');
  if (el) el.remove();
}// ★ 追加：クリップボードからの画像貼り付け（Ctrl+V）に対応 ★
document.getElementById('userInput').addEventListener('paste', function(e) {
  var clipboardData = e.clipboardData || window.clipboardData;
  if (!clipboardData) return;

  var items = clipboardData.items;
  for (var i = 0; i < items.length; i++) {
    // 貼り付けられたデータの中に「画像」が含まれているかチェック
    if (items[i].type.indexOf('image') !== -1) {
      var file = items[i].getAsFile();
      var reader = new FileReader();
      
      reader.onload = function(e_read) {
        // 今まで「📷ボタン」でやっていたのと同じ処理を自動で行う
        pendingImage = { 
          base64: e_read.target.result.split(',')[1], 
          mediaType: file.type, 
          dataUrl: e_read.target.result, 
          name: "貼り付けた画像.png" 
        };
        
        // 画面に画像のプレビューを表示する
        document.getElementById('previewImg').src = e_read.target.result;
        document.getElementById('previewName').textContent = "貼り付けた画像";
        document.getElementById('imagePreview').classList.add('show');
        document.getElementById('imgBtn').classList.add('has-image');
      };
      
      reader.readAsDataURL(file);
      e.preventDefault(); // 画像の文字化けデータがテキストエリアに入るのを防ぐ
      break; 
    }
  }
});
</script>
